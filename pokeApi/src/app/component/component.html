<div class="container">
  <h1>🎮 Pokémon Gallery</h1>
  
  <div class="status">
    <p>Estado: <strong>{{ loading ? 'Cargando imágenes...' : 'Listo' }}</strong></p>
    <p>Total pokémon: <strong>{{ pokemonList.length }}</strong></p>
  </div>

  <div *ngIf="loading" class="loading">
    ⏳ Cargando pokémon con imágenes...
  </div>

  <div *ngIf="error" class="error">
    ❌ {{ error }}
  </div>

  <div *ngIf="!loading && pokemonList.length > 0" class="pokemon-grid">
    <div *ngFor="let pokemon of pokemonList" class="pokemon-card">
      <div class="image-container">
        <img 
          [src]="pokemon.image" 
          [alt]="pokemon.name" 
          class="pokemon-image"
          onerror="this.src='https://via.placeholder.com/200?text=No+Image'"
          loading="lazy"
          crossorigin="anonymous"
        />
      </div>
      <h3>{{ pokemon.name | titlecase }}</h3>
      <p class="description">{{ pokemon.description }}</p>
      <p class="id">#{{ pokemon.id }}</p>
    </div>
  </div>

  <div *ngIf="!loading && pokemonList.length === 0 && !error" class="no-data">
    ℹ️ No hay pokémon disponibles
  </div>
</div>
